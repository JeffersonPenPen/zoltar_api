# Zoltar Fortune API — Nginx location block example
#
# Add this block inside your existing HTTPS server {} block.
# Adjust the port (8090) and path (/zoltar/) as needed.

# Normalize /zoltar without trailing slash
location = /zoltar { return 301 /zoltar/; }

# ZOLTAR - FastAPI/Uvicorn on port 8090
location ^~ /zoltar/ {
    proxy_pass http://127.0.0.1:8090/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
